<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Habit-Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <h1 class="app-name">
          <span class="fire">🔥</span>STREAKE<span class="l-word">R</span>
        </h1>
        <div class="sidebar-section">
          <p>MAIN</p>
          <a href="#" class="active">📊 &#xA0;&#xA0;Dashboard</a>
          <a href="#">✅ &#xA0;&#xA0;My Habits</a>
          <a href="#">⏰ &#xA0;&#xA0;Routines</a>
          <a href="#">📈 &#xA0;&#xA0;Analytics</a>
          <a href="#">🏆 &#xA0;&#xA0;Achievements</a>
        </div>
        <div class="sidebar-section">
          <p>ACCOUNT</p>
          <a href="#">⚙️ &#xA0;&#xA0;Settings</a>
        </div>
        <div class="sidebar-footer">
          <div class="profile-pic">
            <img src="./assets/profile.jpg" alt="" />
          </div>
          <div class="username">Zain Fatima</div>
        </div>
      </aside>
      <main>
        <header>
          <h1>Good Morning! AKSHAY👋</h1>
          <button>+ Add Habit</button>
        </header>
        <div class="week-date">
          <div class="day1 daywise">17</div>
          <div class="day2 daywise">18</div>
          <div class="day3 daywise">19</div>
          <div class="day4 daywise">20</div>
          <div class="day5 daywise">21</div>
          <div class="day6 daywise">22</div>
          <div class="day7 daywise">23</div>
        </div>
        <div class="stats-raw">
          <div>Today Progress</div>
          <div>Best Streak</div>
          <div>Total Point</div>
          <div>This Week</div>
        </div>
        <div class="content-grid">
          <div>
            <div class="card fade-in"></div>
            <div class="card fade-out"></div>
            <div class="daily-note"></div>
          </div>
          <div class="flex-card">
            <div class="today-score"></div>
            <div class="activity-hotmap"></div>
          </div>
        </div>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
